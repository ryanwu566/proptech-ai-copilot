name: Refresh Market Read Model

on:
  workflow_dispatch:

permissions: {}

jobs:
  refresh-market-read-model:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh market read model
        shell: bash
        env:
          RENDER_API_BASE_URL: ${{ secrets.RENDER_API_BASE_URL }}
          MARKET_READ_MODEL_REFRESH_TOKEN: ${{ secrets.MARKET_READ_MODEL_REFRESH_TOKEN }}
        run: |
          set -euo pipefail

          base_url="${RENDER_API_BASE_URL%/}"
          status_file="$(mktemp)"
          body_file="$(mktemp)"
          trap 'rm -f "$status_file" "$body_file"' EXIT

          set +e
          curl \
            --silent \
            --output "$body_file" \
            --write-out "%{http_code}" \
            --connect-timeout 20 \
            --max-time 180 \
            --request POST \
            --header "X-Market-Read-Model-Refresh-Token: ${MARKET_READ_MODEL_REFRESH_TOKEN}" \
            "${base_url}/market-insights/refresh" \
            > "$status_file"
          curl_exit=$?
          set -e

          if [ "$curl_exit" -eq 0 ]; then
            http_status="$(cat "$status_file")"
          else
            http_status="0"
          fi

          if [ "$http_status" = "200" ]; then
            echo "MARKET_READ_MODEL_REFRESH=success"
            echo "MARKET_READ_MODEL_HTTP_STATUS=200"
            exit 0
          fi

          reason_code="$(python - "$body_file" <<'PY'
          import json
          import sys

          allowed = {
              "refresh_runtime_not_configured",
              "valuation_database_unavailable",
              "read_model_initialization_unavailable",
              "read_model_source_aggregate_unavailable",
              "read_model_write_unavailable",
              "read_model_metadata_unavailable",
              "read_model_no_eligible_source_records",
              "read_model_refresh_unavailable",
              "unknown_safe_failure",
          }

          try:
              with open(sys.argv[1], "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
          except Exception:
              print("unknown_safe_failure")
              raise SystemExit(0)

          reason = payload.get("reason_code") if isinstance(payload, dict) else None
          print(reason if reason in allowed else "unknown_safe_failure")
          PY
          )"
          rm -f "$body_file"

          echo "MARKET_READ_MODEL_REFRESH=failed"
          echo "MARKET_READ_MODEL_HTTP_STATUS=${http_status:-0}"
          echo "MARKET_READ_MODEL_REASON=${reason_code}"
          exit 1
